<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Ranbir`s Card Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}:root{--transition-smooth:all 0.3s cubic-bezier(0.4,0,0.2,1)}body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;background-color:var(--background-color);min-height:100vh;padding:20px;transition:var(--transition-smooth)}.toolbar{background-color:var(--card-background);padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:var(--shadow-sm);display:flex;gap:15px;align-items:center;width:80%;left:0}.search-box{flex:8;position:relative}.search-input{width:100%;padding:10px 15px;border:1px solid #ddd;border-radius:5px;font-size:16px}.view-toggle{display:flex;gap:5px}.view-button{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;background-color:#f0f0f0}.view-button.active{background-color:var(--primary-color);color:#fff}.cards-container{display:grid;gap:20px;width:100%;max-width:1600px;grid-template-columns:auto auto auto auto;grid-template-rows:auto;padding:20px;transition:var(--transition-smooth)}.cards-container.grid-view{grid-template-columns:repeat(auto-fill,minmax(300px,2fr))}.cards-container.list-view{grid-template-columns:1fr;max-width:1200px}.card{background-color:var(--card-background);border-radius:12px;box-shadow:var(--shadow-md);transition:var(--transition-smooth);position:relative;overflow:hidden;height:fit-content;display:flex;flex-direction:column;user-select:none;transform:translate(0);transition:transform .3s ease,box-shadow .3s ease}.grid-view .card{min-height:var(--card-height,350px);transition:min-height .3s ease}.grid-view .card-content{padding:20px}.grid-view .card-content,.grid-view .card-info{flex:9;display:flex;padding-top:20px;flex-direction:column}.grid-view .card-image{width:100%;height:200px;padding-top:20px;padding-bottom:4px;object-fit:contain;margin:0}.grid-view .card-icon{width:60px;height:60px;margin:40px auto 20px}.list-view .card{height:var(--card-list-height,120px);transition:height .3s ease}.list-view .card-content{display:grid;grid-template-columns:auto 2f dden;overflow-x:scroll;scroll-snap-align:start;scrollbar-color:var(--primary-color) transparent;::-webkit-scrollbar-button{display:none}scrollbar-width:1px;gap:5px;display:flex}.card-description{padding-top:10px;overflow:hidden;text-overflow:clip;display:-webkit-box;-webkit-line-clamp:4;line-clamp:2;-webkit-box-orient:vertical}.card-actions{display:flex;gap:5px;margin-top:15px;align-items:flex-start}.card-button{flex:2;padding:8px 15px;border:none;border-radius:10px;cursor:pointer;transition:var(--transition-smooth)}.card-button.primary{background-color:var(--primary-color);color:#fff;border-radius:5px}.modal{max-width:500px;position:fixed;top:0;right:0;width:100%;height:100%;background-color:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:var(--transition-smooth);padding:50px;overflow-y:auto;box-sizing:border-box}.modal.active{opacity:1;visibility:visible}.modal-content{max-height:90vh;overflow-y:auto;width:90%;max-width:min(500px,90vw);margin:20px}body.modal-open{overflow:hidden;position:fixed;width:100%}.modal.active .modal-content{transform:translateY(0)}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:500}.form-group input,.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;font-size:16px}@keyframes spin{to{transform:rotate(1turn)}}@keyframes fadeIn{0%{opacity:0}to{opacity:1}}.toast{position:fixed;bottom:45px;left:20px;background-color:var(--secondary-color);color:#fff;padding:10px 20px;border-radius:5px;box-shadow:var(--shadow-lg);transform:translateY(100px);transition:var(--transition-smooth);z-index:100000}.toast.show{transform:translateY(0)}.shortcuts-guide{position:fixed;bottom:20px;left:20px;background-color:var(--card-background);padding:15px;border-radius:5px;box-shadow:var(--shadow-lg);display:none}.shortcuts-guide.show{display:block}.card.dragging{opacity:.9;transform:scale(1.02);box-shadow:0 8px 16px r =dark] ::-webkit-scrollbar-track{background-color:var(--background-color)}[data-theme=dark] ::-webkit-scrollbar-thumb,[data-theme=dark] ::-webkit-scrollbar-thumb:hover{background-color:var(--primary-color)}.control-panel{background:var(--card-background);padding:15px;border-radius:10px;margin:20px auto;box-shadow:var(--shadow-md);max-width:1200px}.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:15px;border-bottom:1px solid var(--border-color)}.filter-buttons{display:flex;gap:10px}.filter-button{padding:8px 15px;border:1px solid var(--border-color);border-radius:5px;background:var(--card-background);color:var(--text-primary);cursor:pointer;transition:all .2s ease}.filter-button.active{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}.import-export{display:flex;gap:10px}.import-export button{padding:8px 15px;border:none;border-radius:5px;background:var(--primary-color);color:#fff;cursor:pointer;transition:all .2s ease}.import-export button:hover{opacity:.9}.card-stats{display:flex;gap:20px;margin-top:10px}.stat-item{padding:10px;border-radius:5px;background:var(--background-color);color:var(--text-primary)}.card-counter,.stat-value{font-weight:700;color:var(--primary-color)}.card-counter{display:block;flex:2;position:fixed;align-items:last baseline;gap:10px;top:97%;left:4%;z-index:10000;left:10px;width:225px;border:none;background-color:var(--card-background)}.doodle-controls{margin-top:15px;padding-top:15px;border-top:1px solid var(--border-color)}.doodle-controls h4{margin-bottom:10px;color:var(--text-primary)}.doodle-buttons{display:flex;gap:10px;margin-bottom:15px}.doodle-button{padding:8px 15px;border:1px solid var(--border-color);border-radius:5px;background:var(--card-background);color:var(--text-primary);cursor:pointer;transition:all .2s ease}.doodle-button:hover{background:var(--primary-color);color:#fff}.doodle-settings{gap:10px}.doodle-settings,.setting-group{display:fl <body>
        <div class=nameofweb id=nameofweb>
        <h1 contenteditable=true><i class="fa-regular fa-note-sticky fa-beat"></i> My Cards</h1>
        </div>
        <div class=toolbar>
        <div class=search-box>
        <input class=search-input placeholder="Search cards...">
        </div>
        <div class=view-toggle>
        <button class="view-button active" data-view=grid>Grid</button>
        <button class=view-button data-view=list>List</button>
        </div>
        <button class="card-button primary" onclick=showAddCardModal()>Add Card</button>
        <input type=file id=importInput accept=.json style=display:none onchange=importCards(event)>
        </div>
        <button class=theme-toggle-btn id=themeToggleBtn aria-label="Toggle theme settings">
        <svg class=theme-icon viewBox="0 0 24 24" xmlns=http://www.w3.org/2000/svg>
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
        </button>
        <div class=theme-controls id=themeControls>
        <h3>Theme Settings</h3>
        <div class=preset-buttons>
        <button class=preset-button style=background-color:var(--preset-default) onclick='applyPresetTheme("default")'>Default</button>
        <button class=preset-button style=background-color:var(--preset-dark) onclick='applyPresetTheme("dark")'>Dark</button>
        <button class=preset-button style=background-color:var(--preset-nature) onclick='applyPresetTheme("nature")'>Nature</button>
        <button class=preset-button style=background-color:var(--preset-sunset) onclick='applyPresetTheme("sunset")'>Sunset</button>
        <button class=preset-button style=background-color:var(--preset-ocean) onclick='applyPresetTheme("ocean")'>Ocean</button>
        </div>
        <div class=color-picker-section>
        <label>Custom Colors</label>
        <div class=color-input-group>
        <input type=color id=primaryColor onchange=updateCustomColors() value=#1a73e8>
        <span>Primary Color</span>
        </div>
        <div class=color-input-group>
        <input type=color id=bgColor onchange=updateCustomColors() value=#f0f2f5>
        <span>Background Color</span>
        </div>
        </div>
        <div class=size-controls>
        <h4>Card Size</h4>
        <div class=size-controls-grid>
        <p>Grid View</p>
        <div class=size-buttons>
        <button class=size-button onclick='updateCardSize("grid",-50)'>-</button>
        <span class="size-value grid-size-value">350px</span>
        <button class=size-button onclick='updateCardSize("grid",50)'>+</button>
        </div>
        </div>
        <div class=size-controls-list style=margin-top:10px>
        <p>List View</p>
        <div class=size-buttons>
        <button class=size-button onclick='updateCardSize("list",-50)'>-</button>
        <span class="size-value list-size-value">120px</span>
        <button class=size-button onclick='updateCardSize("list",50)'>+</button>
        </div>
        </div>
        </div>
        <div class=doodle-controls>
        <h4>Background Doodles</h4>
        <div class=doodle-buttons>
        <button class=doodle-button onclick=refreshDoodles()>
        Refresh Doodles
        </button>
        <button class=doodle-button onclick=toggleDoodles()>
        Toggle Doodles
        </button>
        </div>
        <div class=doodle-settings>
        <div class=setting-group>
        <label>Density</label>
        <input type=range id=doodleDensity min=20000 max=100000 step=10000 value=40000 onchange=updateDoodleDensity(this.value)>
        </div>
        <div class=setting-group>
        <label>Size</label>
        <input type=range id=doodleSize min=10 max=50 value=20 onchange=updateDoodleSize(this.value)>
        </div>
        <div class=setting-group>
        <label>Opacity</label>
        <input type=range id=doodleOpacity min=1 max=6 value=3 onchange=updateDoodleOpacity(this.value)>
        </div>
        </div>
        </div>
        <div class=control-panel>
        <div class=panel-header>
        <div class=filter-buttons>
        <button class="filter-button active" onclick='filterCardsByStatus("all")'>All Cards</button>
        <button class=filter-button onclick='filterCardsByStatus("active")'>Active</button>
        <button class=filter-button onclick='filterCardsByStatus("archived")'>Archived</button>
        </div>
        <div class=import-export>
        <button onclick='document.getElementById("importInput").click()'>Import</button>
        <button onclick=exportCards()>Export</button>
        </div>
        </div>
        <div class=card-stats>
        <div class=stat-item>
        Total Cards: <span class=stat-value id=totalCards>0</span>
        </div>
        <div class=stat-item>
        Active Cards: <span class=stat-value id=activeCards>0</span>
        </div>
        <div class=stat-item>
        Archived Cards: <span class=stat-value id=archivedCards>0</span>
        </div>
        </div>
        </div>
        </div>
        <div class="cards-container grid-view"></div>
        <div class=modal id=addCardModal>
        <div class=modal-content>
        <h2>Add New Card</h2>
        <div class=form-group>
        <label for=cardTitle>Title</label>
        <input id=cardTitle required>
        </div>
        <div class=form-group>
        <label for=cardTags>Tags (comma separated)</label>
        <input id=cardTags>
        </div>
        <div class=form-group>
        <label for=cardDescription>Description</label>
        <textarea id=cardDescription rows=3></textarea>
        </div>

            defaultCards.forEach(card => {
                cards.unshift(card);
            });
        
            // Save the cards to local storage and render them
            saveCards();
            renderCards();
        }
        // Check if user has visited before using localStorage
        if (!localStorage.getItem('hasVisited')) {
            addDefaultCards();
            localStorage.setItem('hasVisited', 'true');
        }


        function saveAppState() {
            try {
                // Save the current arrangement of cards
                const cardArrangement = cards.map(card => ({
                    id: card.id,
                    title: card.title,
                    tags: card.tags,
                    description: card.description,
                    imageUrl: card.imageUrl,
                    link: card.link,
                    status: card.status || "active" // Include status if applicable
                }));
        
                // Save the custom theme settings
                const customTheme = {
                    primary: document.getElementById("primaryColor").value,
                    background: document.getElementById("bgColor").value
                };
        
                // Save editable contents (e.g., titles, descriptions)
                const editableContents = Array.from(document.querySelectorAll('.card-title, .card-description')).map(element => ({
                    id: element.closest('.card').dataset.cardId,
                    content: element.textContent
                }));
        
                // Combine all data into a single object
                const appState = {
                    cards: cardArrangement,
                    customTheme: customTheme,
                    editableContents: editableContents
                };
        
                // Save to local storage
                localStorage.setItem("appState", JSON.stringify(appState));
                showToast("✔️ state saved");
            } catch (error) {
                console.error("Error saving application state:", error);
                showToast("Failed to save application state", "error");
            }
        }
        
        setInterval(saveAppState, 10000);

        // Add event listener for Ctrl + S
        document.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                e.preventDefault(); // Prevent the default save dialog
                saveAppState(); // Call the save function
            }
        });
    </script>
</body>

</html>
